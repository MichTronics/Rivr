; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  PlatformIO project – RIVR Embedded LoRa Node (project-root config)     ║
; ║  Target: ESP32 (Xtensa LX6, ESP-IDF 5.x) + SX1262                       ║
; ║                                                                          ║
; ║  RUN FROM: e:\Projects\Rivr\   (this file must be at project root)       ║
; ║                                                                          ║
; ║  Quick start:                                                            ║
; ║    1. Build Rust lib:                                                    ║
; ║         cd rivr_core && cargo build --features ffi && cd ..             ║
; ║    2. Simulation (no SX1262):                                            ║
; ║         pio run -e esp32_sim                                             ║
; ║         pio run -e esp32_sim -t upload && pio device monitor             ║
; ║    3. Hardware (real SX1262):                                            ║
; ║         pio run -e esp32_hw                                              ║
; ║         pio run -e esp32_hw  -t upload && pio device monitor             ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[platformio]
; src_dir is the ESP-IDF "main" component directory.
; PlatformIO + espidf framework discovers all .c files inside src_dir.
src_dir      = firmware_core
default_envs = esp32_sim

; ─────────────────────────────────────────────────────────────────────────────
; Shared settings inherited by all environments
; ─────────────────────────────────────────────────────────────────────────────
[env]
platform       = espressif32
board          = esp32dev
framework      = espidf
monitor_speed  = 115200
upload_speed   = 921600

; Source files compiled into the "main" ESP-IDF component.
; PlatformIO with espidf uses build_src_filter to add files outside src_dir.
build_src_filter =
    +<../firmware_core/*.c>
    +<../rivr_layer/*.c>

; Common compiler flags
build_flags =
    -std=gnu11
    -Wall -Wextra -Wno-unused-parameter
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    ; Include-path anchored at project root so #include "firmware_core/x.h" works
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    ; SX1262 GPIO pin mapping – edit for your wiring
    -DPIN_SX1262_SCK=18
    -DPIN_SX1262_MOSI=27
    -DPIN_SX1262_MISO=19
    -DPIN_SX1262_NSS=5
    -DPIN_SX1262_BUSY=26
    -DPIN_SX1262_RESET=14
    -DPIN_SX1262_DIO1=33
    -DPIN_LED_STATUS=25

; Rust rivr_core static library path and linker flags.
; Cargo places the .a at:  rivr_core/target/[debug|release]/librivr_core.a
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1   ; tells main/CMakeLists.txt to skip auto-detection

; ─────────────────────────────────────────────────────────────────────────────
; esp32_sim   – proof-of-life: simulated input, no real SX1262 needed
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32_sim]
extends = env
build_flags =
    ${env.build_flags}
    ; Enable simulation mode: replaces radio_init/radio_start_rx with stubs,
    ; injects 5 SENSOR + 5 CHAT frames before the main loop.
    -DRIVR_SIM_MODE=1
    ; In sim mode, TX drain prints frames to UART instead of transmitting.
    -DRIVR_SIM_TX_PRINT=1

lib_extra_dirs = ${PROJECT_DIR}/rivr_core/target/debug

; ─────────────────────────────────────────────────────────────────────────────
; esp32_hw    – real hardware with SX1262
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32_hw]
extends = env
; No simulation flags – full driver stack
lib_extra_dirs = ${PROJECT_DIR}/rivr_core/target/release

build_flags =
    ${env.build_flags}
    ; TODO(SX1262): remove RIVR_SIM_MODE once radio_init() is confirmed working
