; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  PlatformIO project – RIVR Embedded LoRa Node (project-root config)     ║
; ║  Target: ESP32 (Xtensa LX6, ESP-IDF 5.x)                                ║
; ║                                                                          ║
; ║  Board variants are defined in variants/<device>/platformio.ini and      ║
; ║  pulled in automatically via extra_configs below.                        ║
; ║                                                                          ║
; ║  Quick start:                                                            ║
; ║    1. Build Rust lib (cross-compile for Xtensa ESP32):                  ║
; ║         cargo +esp build -p rivr_core                                   ║
; ║           --target xtensa-esp32-espidf --features ffi                   ║
; ║    2. Simulation (no real radio needed):                                 ║
; ║         pio run -e esp32_sim                                             ║
; ║         pio run -e esp32_sim -t upload && pio device monitor             ║
; ║    3. Hardware variants:                                                 ║
; ║         pio run -e client_esp32devkit_e22_900   -t upload               ║
; ║         pio run -e repeater_esp32devkit_e22_900 -t upload               ║
; ║         pio run -e client_lilygo_lora32_v21     -t upload               ║
; ║         pio run -e repeater_lilygo_lora32_v21   -t upload               ║
; ║         pio run -e client_heltec_lora32_v3      -t upload               ║
; ║         pio run -e repeater_heltec_lora32_v3    -t upload               ║
; ║         pio run -e client_heltec_lora32_v2      -t upload               ║
; ║         pio run -e repeater_heltec_lora32_v2    -t upload               ║
; ║         pio run -e client_lilygo_tbeam_sx1262   -t upload               ║
; ║         pio run -e repeater_lilygo_tbeam_sx1262 -t upload               ║
; ║         pio run -e client_lilygo_t3s3           -t upload               ║
; ║         pio run -e repeater_lilygo_t3s3         -t upload               ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[platformio]
; src_dir is the ESP-IDF "main" component directory.
; PlatformIO + espidf framework discovers all .c files inside src_dir.
src_dir      = firmware_core
default_envs = esp32_sim
; Per-device environments live in their own variant folder.
extra_configs =
    variants/esp32devkit_e22_900/platformio.ini
    variants/lilygo_lora32_v21/platformio.ini
    variants/heltec_lora32_v3/platformio.ini
    variants/heltec_lora32_v2/platformio.ini
    variants/lilygo_tbeam_sx1262/platformio.ini
    variants/lilygo_t3s3/platformio.ini

; ─────────────────────────────────────────────────────────────────────────────
; Shared settings inherited by all environments
; ─────────────────────────────────────────────────────────────────────────────
[env]
platform       = espressif32
board          = esp32dev
framework      = espidf
monitor_speed  = 115200
upload_speed   = 921600
; Use the 3MB app partition (huge_app) since the debug build with ESP-IDF 5.x
; and Rust rivr_core exceeds the default 1MB app partition.
; ESP32 has 4MB flash standard; partitions.csv allocates ~2MB to the app.
board_build.partitions = partitions.csv

; Source files compiled into the "main" ESP-IDF component.
; NOTE: build_src_filter is IGNORED by the ESP-IDF framework in PlatformIO.
; All source files are registered in firmware_core/CMakeLists.txt instead.
; build_src_filter is intentionally absent to avoid duplicate compilation.

; Disable PlatformIO's Library Dependency Finder for ESP-IDF projects.
; All linking is handled by ESP-IDF cmake (firmware_core/CMakeLists.txt).
lib_ldf_mode = off

; Common compiler flags
build_flags =
    -std=gnu11
    -Wall -Wextra -Wno-unused-parameter
    ; Suppress "missing .note.GNU-stack implies executable stack" from ESP-IDF HAL objects
    -Wl,--no-warn-execstack
    ; Include-path anchored at project root so #include "firmware_core/x.h" works
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    ; Note: SX1262/SX1276 GPIO pin numbers are set by each variant's config.h
    ; (force-included via the env-specific -include flag below).  The default
    ; pin values in platform_esp32.h match the E22 DevKit wiring, so envs
    ; without a -include (esp32_hw, esp32_sim) get the correct E22 defaults
    ; without any -D flags here.  Remove -D overrides here avoids redefinition
    ; errors when a variant config.h tries to set different values.

; Inject actual git SHA at build time (falls back to "unknown" if git unavailable).
extra_scripts = pre:tools/inject_git_sha.py

; Rust rivr_core static library path and linker flags.
; Cargo (workspace) places the .a at:
;   target/[xtensa-esp32-espidf/][debug|release]/librivr_core.a
; Build with:  cargo +esp build -p rivr_core --target xtensa-esp32-espidf \
;                               --features ffi [--release]
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1

; ─────────────────────────────────────────────────────────────────────────────
; esp32_sim   – proof-of-life: simulated input, no real SX1262 needed
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32_sim]
extends = env
build_flags =
    ${env.build_flags}
    ; Enable simulation mode: replaces radio_init/radio_start_rx with stubs,
    ; injects 5 SENSOR + 5 CHAT frames before the main loop.
    -DRIVR_SIM_MODE=1
    ; In sim mode, TX drain prints frames to UART instead of transmitting.
    -DRIVR_SIM_TX_PRINT=1


; ─────────────────────────────────────────────────────────────────────────────
; esp32_hw    – real hardware with SX1262
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32_hw]
extends = env
; No simulation flags – full driver stack.
; Rust library linked via firmware_core/CMakeLists.txt – no lib_extra_dirs needed.

build_flags =
    ${env.build_flags}
    ; Enable SSD1306 128×64 I2C OLED status display (SDA=21, SCL=22 by default)
    -DFEATURE_DISPLAY=1

