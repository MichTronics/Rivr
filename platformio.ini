; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  PlatformIO project – RIVR Embedded LoRa Node (project-root config)     ║
; ║  Target: ESP32 (Xtensa LX6, ESP-IDF 5.x) + SX1262                       ║
; ║                                                                          ║
; ║  RUN FROM: e:\Projects\Rivr\   (this file must be at project root)       ║
; ║                                                                          ║
; ║  Quick start:                                                            ║
; ║    1. Build Rust lib (cross-compile for Xtensa ESP32):                  ║
; ║         cargo +esp build -p rivr_core                                   ║
; ║           --target xtensa-esp32-espidf --features ffi                   ║
; ║    2. Simulation (no SX1262):                                            ║
; ║         pio run -e esp32_sim                                             ║
; ║         pio run -e esp32_sim -t upload && pio device monitor             ║
; ║    3. Hardware (real SX1262):                                            ║
; ║         pio run -e esp32_hw                                              ║
; ║         pio run -e esp32_hw  -t upload && pio device monitor             ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[platformio]
; src_dir is the ESP-IDF "main" component directory.
; PlatformIO + espidf framework discovers all .c files inside src_dir.
src_dir      = firmware_core
default_envs = esp32_sim

; ─────────────────────────────────────────────────────────────────────────────
; Shared settings inherited by all environments
; ─────────────────────────────────────────────────────────────────────────────
[env]
platform       = espressif32
board          = esp32dev
framework      = espidf
monitor_speed  = 115200
upload_speed   = 921600
; Use the 3MB app partition (huge_app) since the debug build with ESP-IDF 5.x
; and Rust rivr_core exceeds the default 1MB app partition.
; ESP32 has 4MB flash standard; partitions.csv allocates ~2MB to the app.
board_build.partitions = partitions.csv

; Source files compiled into the "main" ESP-IDF component.
; NOTE: build_src_filter is IGNORED by the ESP-IDF framework in PlatformIO.
; All source files are registered in firmware_core/CMakeLists.txt instead.
; build_src_filter is intentionally absent to avoid duplicate compilation.

; Disable PlatformIO's Library Dependency Finder for ESP-IDF projects.
; All linking is handled by ESP-IDF cmake (firmware_core/CMakeLists.txt).
lib_ldf_mode = off

; Common compiler flags
build_flags =
    -std=gnu11
    -Wall -Wextra -Wno-unused-parameter
    -DLOG_LOCAL_LEVEL=ESP_LOG_DEBUG
    ; Include-path anchored at project root so #include "firmware_core/x.h" works
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    ; Note: SX1262/SX1276 GPIO pin numbers are set by each variant's config.h
    ; (force-included via the env-specific -include flag below).  The default
    ; pin values in platform_esp32.h match the E22 DevKit wiring, so envs
    ; without a -include (esp32_hw, esp32_sim) get the correct E22 defaults
    ; without any -D flags here.  Remove -D overrides here avoids redefinition
    ; errors when a variant config.h tries to set different values.

; Rust rivr_core static library path and linker flags.
; Cargo (workspace) places the .a at:
;   target/[xtensa-esp32-espidf/][debug|release]/librivr_core.a
; Build with:  cargo +esp build -p rivr_core --target xtensa-esp32-espidf \
;                               --features ffi [--release]
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1

; ─────────────────────────────────────────────────────────────────────────────
; esp32_sim   – proof-of-life: simulated input, no real SX1262 needed
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32_sim]
extends = env
build_flags =
    ${env.build_flags}
    ; Enable simulation mode: replaces radio_init/radio_start_rx with stubs,
    ; injects 5 SENSOR + 5 CHAT frames before the main loop.
    -DRIVR_SIM_MODE=1
    ; In sim mode, TX drain prints frames to UART instead of transmitting.
    -DRIVR_SIM_TX_PRINT=1


; ─────────────────────────────────────────────────────────────────────────────
; esp32_hw    – real hardware with SX1262
; ─────────────────────────────────────────────────────────────────────────────
[env:esp32_hw]
extends = env
; No simulation flags – full driver stack
; Rust library linked via firmware_core/CMakeLists.txt – no lib_extra_dirs needed.

build_flags =
    ${env.build_flags}
    ; TODO(SX1262): remove RIVR_SIM_MODE once radio_init() is confirmed working
    ; Enable SSD1306 128×64 I2C OLED status display (SDA=21, SCL=22 by default)
    -DFEATURE_DISPLAY=1

; ─────────────────────────────────────────────────────────────────────────────
; repeater_esp32devkit_e22_900 – headless repeater, Rivr Fabric relay enabled
;
;   Hardware : ESP32 DevKit V1 + EBYTE E22-900M30S or E22-900M33S (SX1262)
;   Role     : relay-only node; applies congestion-aware DELAY/DROP to
;              PKT_CHAT and PKT_DATA relay via RIVR Fabric (RIVR_FABRIC_REPEATER=1)
;
;   Build    : pio run -e repeater_esp32devkit_e22_900 -t upload
;   Monitor  : pio device monitor -e repeater_esp32devkit_e22_900
;
;   Override frequency from command line:
;     pio run -e repeater_esp32devkit_e22_900 \
;             --build-option="build_flags=-DRIVR_RF_FREQ_HZ=915000000"
;   Or put -DRIVR_RF_FREQ_HZ=... as the FIRST extra flag, before -include;
;   the #ifndef guard in the variant header will then leave it untouched.
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_esp32devkit_e22_900]
extends = env
; Variant header is force-included before every translation unit.  It sets
; RIVR_FABRIC_REPEATER=1, RIVR_BUILD_REPEATER=1, RIVR_RF_FREQ_HZ, and the
; RF-switch enable flag.  All pin macros use #ifndef guards — the shared
; [env] -D flags above take precedence (same values).
build_flags =
    ${env.build_flags}
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_esp32devkit_e22_900\""
    "-DRIVR_GIT_SHA=\"unknown\""
    -include ${PROJECT_DIR}/variants/esp32devkit_e22_900_repeater/config.h

; ─────────────────────────────────────────────────────────────────────────────
; client_esp32devkit_e22_900 – chat client node, no CHAT/DATA relay
;
;   Hardware : ESP32 DevKit V1 + EBYTE E22-900M30S or E22-900M33S (SX1262)
;   Role     : client node; sends and receives PKT_CHAT/DATA but does NOT
;              relay CHAT or DATA frames received from other nodes.
;              Control frames (BEACON, ROUTE_REQ/RPL, ACK, PROG_PUSH) relay
;              normally.  Rivr Fabric is completely disabled.
;
;   Build    : pio run -e client_esp32devkit_e22_900 -t upload
;   Monitor  : pio device monitor -e client_esp32devkit_e22_900
;
;   Override frequency: same pattern as repeater env above.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_esp32devkit_e22_900]
extends = env
; Variant header sets RIVR_ROLE_CLIENT=1, RIVR_FABRIC_REPEATER=0, RF freq,
; RF-switch pins.  All PIN_SX1262_* macros use #ifndef guards and defer to
; the shared [env] -D values above.
build_flags =
    ${env.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_esp32devkit_e22_900\""
    "-DRIVR_GIT_SHA=\"unknown\""
    -include ${PROJECT_DIR}/variants/esp32devkit_e22_900_client/config.h

; ─────────────────────────────────────────────────────────────────────────────
; repeater_lilygo_lora32_v21 – headless repeater, LilyGo LoRa32 V2.1_1.6
;
;   Hardware : LilyGo LoRa32 V2.1_1.6 (integrated SX1276 868 MHz, OLED)
;   Radio    : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role     : relay-only, Rivr Fabric congestion control enabled
;
;   Build    : pio run -e repeater_lilygo_lora32_v21 -t upload
;   Monitor  : pio device monitor -e repeater_lilygo_lora32_v21
;
;   Override frequency (e.g. AU915):
;     pio run -e repeater_lilygo_lora32_v21 \
;             --build-option="build_flags=-DRIVR_RF_FREQ_HZ=915000000"
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_lilygo_lora32_v21]
extends = env
build_flags =
    ${env.build_flags}
    ; Radio + role flags
    -DRIVR_RADIO_SX1276=1
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_lilygo_lora32_v21\""
    "-DRIVR_GIT_SHA=\"unknown\""
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1

; ─────────────────────────────────────────────────────────────────────────────
; client_lilygo_lora32_v21 – chat client, LilyGo LoRa32 V2.1_1.6
;
;   Hardware : LilyGo LoRa32 V2.1_1.6 (integrated SX1276 868 MHz, OLED)
;   Radio    : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role     : send and receive PKT_CHAT/DATA; does NOT relay CHAT or DATA.
;              Control frames relay normally.  Rivr Fabric disabled.
;
;   Build    : pio run -e client_lilygo_lora32_v21 -t upload
;   Monitor  : pio device monitor -e client_lilygo_lora32_v21
; ─────────────────────────────────────────────────────────────────────────────
[env:client_lilygo_lora32_v21]
extends = env
build_flags =
    ${env.build_flags}
    ; Radio + role flags
    -DRIVR_RADIO_SX1276=1
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1
