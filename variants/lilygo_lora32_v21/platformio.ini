; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: LilyGo LoRa32 V2.1_1.6  (integrated SX1276, 868/915 MHz)     ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_lilygo_lora32_v21        – chat client, no CHAT/DATA relay     ║
; ║    client_lilygo_lora32_v21_ble    – client + NimBLE BLE bridge          ║
; ║    repeater_lilygo_lora32_v21      – fabric repeater, full relay         ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_lilygo_lora32_v21       -t upload                   ║
; ║    pio run -e client_lilygo_lora32_v21_ble   -t upload                   ║
; ║    pio run -e repeater_lilygo_lora32_v21     -t upload                   ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; LoRa RF parameters – shared by both environments for this variant.
;
; Edit the values below to change the air interface for ALL lilygo builds.
; Both the client and repeater environment pick these up via
; ${rf_lilygo_lora32.build_flags} so you only need to change them in one place.
;
;   RF_SPREADING_FACTOR   7 … 12  (higher = longer range, lower data rate)
;   RF_BANDWIDTH_KHZ      7 | 10 | 15 | 20 | 31 | 41 | 62 | 125 | 250 | 500
;   RF_CODING_RATE        5 (= 4/5, low overhead) … 8 (= 4/8, max redundancy)
;   RF_TX_POWER_DBM       2 … 17 (standard) or 20 (+20 dBm PA_BOOST mode)
;   RIVR_RF_FREQ_HZ       centre frequency in Hz
;                         869480000 = EU868 g3 high-power (default)
;                         868100000 = EU868 channel 0
;                         915000000 = AU915 / US915
;                         923000000 = AS923
; ─────────────────────────────────────────────────────────────────────────────
[rf_lilygo_lora32]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_KHZ=62
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=20
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; client_lilygo_lora32_v21 – chat client, no CHAT/DATA relay
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : send/receive PKT_CHAT/DATA; Rivr Fabric disabled.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_lilygo_lora32_v21]
extends = env
build_flags =
    ${env.build_flags}
    ${rf_lilygo_lora32.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_lilygo_lora32_v21\""
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1

; ─────────────────────────────────────────────────────────────────────────────
; client_lilygo_lora32_v21_ble – client + NimBLE BLE bridge
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : chat client + NimBLE BLE bridge (RIVR_FEATURE_BLE=1).
;           Advertises as "RIVR-XXXX", accepts GATT writes (Nordic NUS UUIDs).
; ─────────────────────────────────────────────────────────────────────────────
[env:client_lilygo_lora32_v21_ble]
extends = env
build_flags =
    ${env.build_flags}
    ${rf_lilygo_lora32.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=0              ; set non-zero (e.g. 123456) to require MITM passkey bonding
    "-DRIVR_BUILD_ENV=\"client_lilygo_lora32_v21_ble\""
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.ble"

; ─────────────────────────────────────────────────────────────────────────────
; repeater_lilygo_lora32_v21 – headless relay node, Rivr Fabric enabled
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : relay PKT_CHAT/DATA with congestion-aware DELAY/DROP via
;           RIVR Fabric (RIVR_FABRIC_REPEATER=1).
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_lilygo_lora32_v21]
extends = env
build_flags =
    ${env.build_flags}
    ${rf_lilygo_lora32.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_ROLE_REPEATER=1
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_lilygo_lora32_v21\""
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1276.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1
