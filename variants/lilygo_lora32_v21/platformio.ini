; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: LilyGo LoRa32 V2.1_1.6  (integrated SX1276, 868/915 MHz)     ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_lilygo_lora32_v21    – chat client, no CHAT/DATA relay         ║
; ║    repeater_lilygo_lora32_v21  – fabric repeater, full relay             ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_lilygo_lora32_v21   -t upload                       ║
; ║    pio run -e repeater_lilygo_lora32_v21 -t upload                       ║
; ║                                                                          ║
; ║  Override frequency (e.g. AU915):                                        ║
; ║    pio run -e repeater_lilygo_lora32_v21 \                               ║
; ║            --build-option="build_flags=-DRIVR_RF_FREQ_HZ=915000000"     ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; client_lilygo_lora32_v21 – chat client, no CHAT/DATA relay
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : send/receive PKT_CHAT/DATA; Rivr Fabric disabled.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_lilygo_lora32_v21]
extends = env
build_flags =
    ${env.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_lilygo_lora32_v21\""
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1

; ─────────────────────────────────────────────────────────────────────────────
; repeater_lilygo_lora32_v21 – headless relay node, Rivr Fabric enabled
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : relay PKT_CHAT/DATA with congestion-aware DELAY/DROP via
;           RIVR Fabric (RIVR_FABRIC_REPEATER=1).
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_lilygo_lora32_v21]
extends = env
build_flags =
    ${env.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_lilygo_lora32_v21\""
    -include ${PROJECT_DIR}/variants/lilygo_lora32_v21/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1
