; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: LilyGo T-Beam v1.1 / v1.2  (ESP32, SX1262, AXP192 PMIC)     ║
; ║                                                                          ║
; ║  ⚠  EXPERIMENTAL — requires AXP192 PMIC init in platform_esp32.c       ║
; ║     (RIVR_TBEAM_AXP192=1).  The board will not power the SX1262 radio  ║
; ║     until platform_esp32.c is extended to initialise the AXP192.        ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_lilygo_tbeam_sx1262        – chat client, no CHAT/DATA relay   ║
; ║    client_lilygo_tbeam_sx1262_ble    – client + BLE bridge               ║
; ║    repeater_lilygo_tbeam_sx1262      – fabric repeater, full relay       ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_lilygo_tbeam_sx1262       -t upload                 ║
; ║    pio run -e client_lilygo_tbeam_sx1262_ble   -t upload                 ║
; ║    pio run -e repeater_lilygo_tbeam_sx1262     -t upload                 ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; LoRa RF parameters – shared by both environments for this variant.
;
; T-Beam uses the onboard SX1262 with no external PA.
; Max chip output is +22 dBm; RF_TX_POWER_DBM=17 is a safe default.
;
;   RF_SPREADING_FACTOR   7 … 12
;   RF_BANDWIDTH_HZ       7800 | 10400 | 15600 | 20800 | 31250 | 41700 | 62500 | 125000 | 250000 | 500000
;   RF_CODING_RATE        5 (= 4/5) … 8 (= 4/8)
;   RF_TX_POWER_DBM       -9 … 22  (SX1262 chip output, no external PA)
;   RIVR_RF_FREQ_HZ       centre frequency in Hz
;                         869480000 = EU868 g3 (default)
;                         868100000 = EU868 channel 0
;                         915000000 = AU915 / US915
;                         923000000 = AS923
; ─────────────────────────────────────────────────────────────────────────────
[rf_lilygo_tbeam_sx1262]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=17
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; client_lilygo_tbeam_sx1262 – chat client, no CHAT/DATA relay
; ─────────────────────────────────────────────────────────────────────────────
[env:client_lilygo_tbeam_sx1262]
extends = env
board   = ttgo-t-beam
build_flags =
    ${env.build_flags}
    ${rf_lilygo_tbeam_sx1262.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_lilygo_tbeam_sx1262\""
    -include ${PROJECT_DIR}/variants/lilygo_tbeam_sx1262/config.h
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    "-DSDKCONFIG=${PROJECT_DIR}/sdkconfig.client_lilygo_tbeam_sx1262"

; ─────────────────────────────────────────────────────────────────────────────
; client_lilygo_tbeam_sx1262_ble – client + BLE bridge
;
;   ⚠  Inherits the AXP192 PMIC experimental caveat from the base client env.
;   Role : chat client + BLE bridge (RIVR_FEATURE_BLE=1).
; ─────────────────────────────────────────────────────────────────────────────
[env:client_lilygo_tbeam_sx1262_ble]
extends = env
board   = ttgo-t-beam
build_flags =
    ${env.build_flags}
    ${rf_lilygo_tbeam_sx1262.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=0              ; set non-zero (e.g. 123456) to require MITM passkey bonding
    "-DRIVR_BUILD_ENV=\"client_lilygo_tbeam_sx1262_ble\""
    -include ${PROJECT_DIR}/variants/lilygo_tbeam_sx1262/config.h
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.ble"


; ─────────────────────────────────────────────────────────────────────────────
; repeater_lilygo_tbeam_sx1262 – headless relay node, Rivr Fabric enabled
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_lilygo_tbeam_sx1262]
extends = env
board   = ttgo-t-beam
build_flags =
    ${env.build_flags}
    ${rf_lilygo_tbeam_sx1262.build_flags}
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_lilygo_tbeam_sx1262\""
    -include ${PROJECT_DIR}/variants/lilygo_tbeam_sx1262/config.h
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1

