; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Waveshare RP2040 LoRa  (RP2040 + SX1262)                      ║
; ║                                                                          ║
; ║  Platform : raspberrypi (PlatformIO RP2040 platform)                    ║
; ║  Framework: arduino     (earlephilhower arduino-pico BSP)                ║
; ║                                                                          ║
; ║  Environments:                                                           ║
; ║    client_waveshare_rp2040_lora   – chat client, USB serial              ║
; ║    repeater_waveshare_rp2040_lora – fabric repeater                      ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_waveshare_rp2040_lora   -t upload                  ║
; ║    pio run -e repeater_waveshare_rp2040_lora -t upload                  ║
; ║                                                                          ║
; ║  Upload method: USB (hold BOOT button while connecting, or 1200bps       ║
; ║                  auto-reset works with picotool).                        ║
; ║                                                                          ║
; ║  Rust rivr_core target: thumbv6m-none-eabi  (ARM Cortex-M0+)            ║
; ║  Build the library first:                                                ║
; ║    cargo +stable build -p rivr_core                                     ║
; ║      --target thumbv6m-none-eabi                                        ║
; ║      --no-default-features --features ffi --release                     ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; Shared LoRa RF parameters for Waveshare RP2040 LoRa
; Defaults: SF8, BW62.5k, CR4/8, +14 dBm, EU868 (869.48 MHz)
; ─────────────────────────────────────────────────────────────────────────────
[rf_waveshare_rp2040_lora]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=14
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; Shared RP2040 build configuration
;
; build_src_filter:
;   The root platformio.ini sets src_dir = firmware_core which is used by all
;   ESP32 variants via ESP-IDF component register.  For RP2040 we override
;   src_dir and explicitly list the sources that compile cleanly on ARM.
;
;   Excluded (ESP-IDF/Xtensa/nRF52 specific):
;     main.c                – app_main() entry point, uses ESP-IDF
;     platform_esp32.c      – ESP-IDF GPIO/SPI driver
;     timebase.c            – uses esp_timer
;     radio_sx1262.c        – includes driver/gpio.h, esp_task_wdt.h
;     radio_sx1276.c        – not used here (ESP-IDF specific)
;     rivr_panic.c          – uses RTC slow memory (ESP32 specific)
;     rivr_ota_platform.c   – ESP-IDF NVS backend
;     platform_nrf52.cpp    – nRF52 SPI driver
;     timebase_nrf52.c      – FreeRTOS timer (nRF52 specific)
;     radio_sx1262_nrf52.c  – nRF52 specific
;     rivr_panic_nrf52.c    – nRF52 specific
;     rivr_ota_platform_nrf52.c – nRF52 specific
;     display/              – SSD1306 display (not present on this board)
;     ble/                  – ESP-IDF BLE stack
;     iface/                – ESP-IDF USB-UART SLIP bridge
;
;   Included RP2040 replacements (in variants/waveshare_rp2040_lora/ and
;   firmware_core/):
;     platform_rp2040.cpp         – Arduino SPI1/GPIO HAL
;     radio_sx1262_rp2040.c       – radio driver without ESP-IDF/FreeRTOS deps
;     timebase_rp2040.cpp         – pico hardware repeating timer
;     rivr_panic_rp2040.c         – stub crash handler
;     rivr_ota_platform_rp2040.c  – stub OTA persistence
;     main_rp2040.cpp             – Arduino setup()/loop() entry point
; ─────────────────────────────────────────────────────────────────────────────
[env_rp2040_base]
platform  = raspberrypi
framework = arduino
board     = waveshare_rp2040_lora

lib_deps =
    SPI
    Wire

; Override src_dir so PlatformIO uses our explicit source list
; instead of the ESP-IDF component structure.
build_src_filter =
    -<*>
    +<../firmware_core/dutycycle.c>
    +<../firmware_core/airtime_sched.c>
    +<../firmware_core/beacon_sched.c>
    +<../firmware_core/protocol.c>
    +<../firmware_core/routing.c>
    +<../firmware_core/route_cache.c>
    +<../firmware_core/neighbor_table.c>
    +<../firmware_core/pending_queue.c>
    +<../firmware_core/rivr_fabric.c>
    +<../firmware_core/rivr_metrics.c>
    +<../firmware_core/rivr_log.c>
    +<../firmware_core/retry_table.c>
    +<../firmware_core/build_info.c>
    +<../firmware_core/ed25519_verify.c>
    +<../firmware_core/rivr_ota_core.c>
    +<../firmware_core/rivr_ota_platform_rp2040.c>
    +<../firmware_core/policy.c>
    +<../firmware_core/hal/radio_if.c>
    +<../firmware_core/rivr_policy.c>
    +<../firmware_core/crypto/hmac_sha256.c>
    +<../firmware_core/rivr_bus/rivr_bus.c>
    +<../firmware_core/rivr_bus/rivr_dup_cache.c>
    +<../firmware_core/rivr_bus/rivr_dispatch.c>
    +<../firmware_core/iface/rivr_iface_ble.c>
    +<../firmware_core/iface/rivr_iface_lora.c>
    +<../rivr_layer/rivr_embed.c>
    +<../rivr_layer/rivr_sinks.c>
    +<../rivr_layer/rivr_sources.c>
    +<../rivr_layer/rivr_cli.c>
    +<../rivr_layer/rivr_svc.c>
    +<../firmware_core/platform_rp2040.cpp>
    +<../firmware_core/radio_sx1262_rp2040.c>
    +<../firmware_core/timebase_rp2040.cpp>
    +<../firmware_core/rivr_panic_rp2040.c>
    +<../variants/waveshare_rp2040_lora/compat/driver/uart_rp2040.cpp>
    +<../variants/waveshare_rp2040_lora/main_rp2040.cpp>

build_flags =
    ; Put compat headers first so they shadow the ESP-IDF headers that
    ; shared source files reference (e.g. esp_log.h, freertos/FreeRTOS.h).
    -I${PROJECT_DIR}/variants/waveshare_rp2040_lora/compat
    ; Project-root include so #include "firmware_core/foo.h" resolves.
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    ; Rivr_core static library (ARM Cortex-M0+ / thumbv6m-none-eabi).
    ; --whole-archive forces the linker to include all symbols from the archive
    ; even when it appears before the object files in the link command.
    -Wl,--whole-archive
    -Wl,${PROJECT_DIR}/target/thumbv6m-none-eabi/release/librivr_core.a
    -Wl,--no-whole-archive
    ; Platform tag
    -DRIVR_PLATFORM_RP2040=1
    ; Required for PRIu32 etc. in C++ compilation units
    -D__STDC_FORMAT_MACROS=1
    ; Include the variant config (pins, radio driver selection, platform tag)
    -include ${PROJECT_DIR}/variants/waveshare_rp2040_lora/config.h

; ─────────────────────────────────────────────────────────────────────────────
; client_waveshare_rp2040_lora – chat client, USB serial
; ─────────────────────────────────────────────────────────────────────────────
[env:client_waveshare_rp2040_lora]
extends = env_rp2040_base
build_flags =
    ${env_rp2040_base.build_flags}
    ${rf_waveshare_rp2040_lora.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_waveshare_rp2040_lora\""

; ─────────────────────────────────────────────────────────────────────────────
; repeater_waveshare_rp2040_lora – headless relay node
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_waveshare_rp2040_lora]
extends = env_rp2040_base
build_flags =
    ${env_rp2040_base.build_flags}
    ${rf_waveshare_rp2040_lora.build_flags}
    -DRIVR_ROLE_CLIENT=0
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_waveshare_rp2040_lora\""
