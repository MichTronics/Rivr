; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Waveshare RP2040-LoRa-HF                                     ║
; ║                                                                          ║
; ║  Platform : raspberrypi  (RP2040)                                       ║
; ║  Framework: arduino      (Earle Philhower core via PlatformIO)          ║
; ║                                                                          ║
; ║  References: Meshtastic + MeshCore board mappings.                      ║
; ║                                                                          ║
; ║  Environments:                                                           ║
; ║    client_waveshare_rp2040_lora_hf    – chat client, USB serial         ║
; ║    repeater_waveshare_rp2040_lora_hf  – fabric repeater                 ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[rf_waveshare_rp2040_lora_hf]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=22
    -DRIVR_RF_FREQ_HZ=869480000

[env_rp2040_base]
platform          = https://github.com/maxgerhardt/platform-raspberrypi.git
framework         = arduino
board             = waveshare_rp2040_lora
board_build.core  = earlephilhower
board_build.filesystem_size = 64k
upload_protocol   = picotool
lib_deps =
    SPI
    Wire
    LittleFS

build_src_filter =
    -<*>
    +<../firmware_core/dutycycle.c>
    +<../firmware_core/airtime_sched.c>
    +<../firmware_core/beacon_sched.c>
    +<../firmware_core/protocol.c>
    +<../firmware_core/routing.c>
    +<../firmware_core/route_cache.c>
    +<../firmware_core/neighbor_table.c>
    +<../firmware_core/pending_queue.c>
    +<../firmware_core/rivr_fabric.c>
    +<../firmware_core/rivr_metrics.c>
    +<../firmware_core/rivr_log.c>
    +<../firmware_core/retry_table.c>
    +<../firmware_core/build_info.c>
    +<../firmware_core/ed25519_verify.c>
    +<../firmware_core/rivr_ota_core.c>
    +<../firmware_core/rivr_ota_platform_rp2040.c>
    +<../firmware_core/nvs_rp2040.cpp>
    +<../firmware_core/policy.c>
    +<../firmware_core/hal/radio_if.c>
    +<../firmware_core/rivr_policy.c>
    +<../firmware_core/crypto/hmac_sha256.c>
    +<../firmware_core/rivr_bus/rivr_bus.c>
    +<../firmware_core/rivr_bus/rivr_dup_cache.c>
    +<../firmware_core/rivr_bus/rivr_dispatch.c>
    +<../firmware_core/ble/rivr_ble_companion.c>
    +<../firmware_core/iface/rivr_iface_ble.c>
    +<../firmware_core/iface/rivr_iface_lora.c>
    +<../rivr_layer/rivr_embed.c>
    +<../rivr_layer/rivr_sinks.c>
    +<../rivr_layer/rivr_sources.c>
    +<../rivr_layer/rivr_cli.c>
    +<../rivr_layer/rivr_svc.c>
    +<../firmware_core/platform_rp2040.cpp>
    +<../firmware_core/radio_sx1262_rp2040.c>
    +<../firmware_core/timebase_rp2040.c>
    +<../firmware_core/rivr_panic_rp2040.c>
    +<../variants/waveshare_rp2040_lora_hf/main_rp2040.cpp>

build_flags =
    -I${PROJECT_DIR}/variants/waveshare_rp2040_lora_hf/compat
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    -DDEBUG_RP2040_PORT=Serial
    -Wl,--whole-archive
    -Wl,${PROJECT_DIR}/target/thumbv6m-none-eabi/release/librivr_core.a
    -Wl,--no-whole-archive
    -DRIVR_PLATFORM_RP2040=1
    -D__STDC_FORMAT_MACROS=1
    -include ${PROJECT_DIR}/variants/waveshare_rp2040_lora_hf/config.h

[env:client_waveshare_rp2040_lora_hf]
extends = env_rp2040_base
build_flags =
    ${env_rp2040_base.build_flags}
    ${rf_waveshare_rp2040_lora_hf.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_waveshare_rp2040_lora_hf\""

[env:repeater_waveshare_rp2040_lora_hf]
extends = env_rp2040_base
build_flags =
    ${env_rp2040_base.build_flags}
    ${rf_waveshare_rp2040_lora_hf.build_flags}
    -DRIVR_ROLE_CLIENT=0
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_ROLE_REPEATER=1
    -DRIVR_NET_ID=0x0000
    "-DRIVR_CALLSIGN=\"RIVR\""
    "-DRIVR_BUILD_ENV=\"repeater_waveshare_rp2040_lora_hf\""

[env:usbdebug_waveshare_rp2040_lora_hf]
extends = env_rp2040_base
build_flags =
    ${env_rp2040_base.build_flags}
    -DRIVR_RP2040_USB_DEBUG=1
    -DRIVR_SIM_MODE=1
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"usbdebug_waveshare_rp2040_lora_hf\""

[env:usbprobe_waveshare_rp2040_lora_hf]
platform  = raspberrypi
framework = arduino
board     = waveshare_rp2040_lora
upload_protocol = picotool
build_src_filter =
    -<*>
    +<../variants/waveshare_rp2040_lora_hf/main_usb_probe.cpp>
build_flags =
    -I${PROJECT_DIR}
    -include ${PROJECT_DIR}/variants/waveshare_rp2040_lora_hf/config.h
