; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Heltec T114  (nRF52840 + SX1262)                              ║
; ║                                                                          ║
; ║  Platform : nordicnrf52  (PlatformIO nRF52 platform)                    ║
; ║  Framework: arduino      (Adafruit nRF52 Arduino BSP, includes FreeRTOS)║
; ║                                                                          ║
; ║  Environments:                                                           ║
; ║    client_heltec_t114      – chat client, USB serial                    ║
; ║    client_heltec_t114_ble  – chat client + Bluefruit BLE companion      ║
; ║    repeater_heltec_t114    – fabric repeater                            ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_heltec_t114   -t upload                            ║
; ║    pio run -e repeater_heltec_t114 -t upload                            ║
; ║                                                                          ║
; ║  Rust rivr_core target: thumbv7em-none-eabihf  (ARM Cortex-M4F)         ║
; ║  Build the library first:                                                ║
; ║    cargo build -p rivr_core --target thumbv7em-none-eabihf              ║
; ║      --no-default-features --features ffi --release                     ║
; ║      -Zbuild-std=core,alloc,panic_abort                                 ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; Shared LoRa RF parameters for T114
; ─────────────────────────────────────────────────────────────────────────────
[rf_heltec_t114]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=17
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; Shared nRF52 build configuration
;
; build_src_filter:
;   The root platformio.ini sets src_dir = firmware_core which is used by all
;   ESP32 variants via ESP-IDF component register.  For nRF52 we override
;   src_dir and explicitly list the sources that compile cleanly on ARM.
;
;   Excluded (ESP-IDF/Xtensa specific):
;     main.c              – app_main() entry point, uses FreeRTOS/ESP-IDF
;     platform_esp32.c    – ESP-IDF GPIO/SPI driver
;     timebase.c          – uses esp_timer
;     radio_sx1262.c      – includes driver/gpio.h, esp_task_wdt.h
;     radio_sx1276.c      – not used on T114 + ESP-IDF specific
;     rivr_panic.c        – uses RTC slow memory (ESP32 specific)
;     rivr_ota_platform.c – ESP-IDF NVS backend
;     display/            – SSD1306 display (not present on T114)
;     ble/                – ESP-IDF BLE stack
;     iface/              – ESP-IDF USB-UART SLIP bridge
;
;   Included nRF52 replacements (in variants/heltec_t114/):
;     platform_nrf52.c    – Arduino SPI/GPIO HAL
;     radio_sx1262_nrf52.c – radio driver without ESP-IDF deps
;     timebase_nrf52.c    – FreeRTOS software timer (Arduino nRF52 has FreeRTOS)
;     rivr_panic_nrf52.c  – stub crash handler for nRF52
;     main_nrf52.cpp      – Arduino setup()/loop() entry point
; ─────────────────────────────────────────────────────────────────────────────
[env_nrf52_base]
platform  = nordicnrf52
; Pin the exact Adafruit nRF52 BSP version (same as MeshCore)
platform_packages = framework-arduinoadafruitnrf52 @ 1.10700.0
framework = arduino
; Custom board definition (boards/heltec_t114.json in project root)
board     = heltec_t114
; Custom linker script: sets correct FLASH/RAM regions for S140 v6.1.1
board_build.ldscript = boards/nrf52840_s140_v6.ld
; BSP framework libraries (custom boards don't get auto-discovery like built-in boards)
lib_deps =
    SPI
    Wire
    ${sysenv.HOME}/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino

; Override the project src_dir so PlatformIO uses our explicit source list
; instead of the ESP-IDF component structure.
build_src_filter =
    -<*>
    +<../firmware_core/dutycycle.c>
    +<../firmware_core/airtime_sched.c>
    +<../firmware_core/beacon_sched.c>
    +<../firmware_core/protocol.c>
    +<../firmware_core/routing.c>
    +<../firmware_core/route_cache.c>
    +<../firmware_core/neighbor_table.c>
    +<../firmware_core/pending_queue.c>
    +<../firmware_core/rivr_fabric.c>
    +<../firmware_core/rivr_metrics.c>
    +<../firmware_core/rivr_log.c>
    +<../firmware_core/retry_table.c>
    +<../firmware_core/build_info.c>
    +<../firmware_core/ed25519_verify.c>
    +<../firmware_core/rivr_ota_core.c>
    +<../firmware_core/rivr_ota_platform_nrf52.c>
    +<../firmware_core/policy.c>
    +<../firmware_core/hal/radio_if.c>
    +<../firmware_core/rivr_policy.c>
    +<../firmware_core/crypto/hmac_sha256.c>
    +<../firmware_core/rivr_bus/rivr_bus.c>
    +<../firmware_core/rivr_bus/rivr_dup_cache.c>
    +<../firmware_core/rivr_bus/rivr_dispatch.c>
    +<../firmware_core/ble/rivr_ble_companion.c>
    +<../firmware_core/iface/rivr_iface_ble.c>
    +<../firmware_core/iface/rivr_iface_lora.c>
    +<../rivr_layer/rivr_embed.c>
    +<../rivr_layer/rivr_sinks.c>
    +<../rivr_layer/rivr_sources.c>
    +<../rivr_layer/rivr_cli.c>
    +<../rivr_layer/rivr_svc.c>
    +<platform_nrf52.cpp>
    +<radio_sx1262_nrf52.c>
    +<timebase_nrf52.c>
    +<rivr_panic_nrf52.c>
    +<../variants/heltec_t114/variant.cpp>
    +<../variants/heltec_t114/main_nrf52.cpp>

build_flags =
    ; Put compat headers first so they shadow the ESP-IDF headers that
    ; shared source files reference (e.g. esp_log.h, freertos/FreeRTOS.h).
    -I${PROJECT_DIR}/variants/heltec_t114/compat
    ; Variant directory: provides variant.h so the Adafruit BSP resolves our
    ; custom board pin mapping (same technique as MeshCore for heltec_t114).
    -I${PROJECT_DIR}/variants/heltec_t114
    ; Adafruit TinyUSB Arduino library (bundled inside the BSP, but the BSP's
    ; SPI/Wire libraries include it unconditionally; add the src path so those
    ; headers are found without pulling in the full TinyUSB build).
    -I${sysenv.HOME}/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
    ; Project-root include so #include "firmware_core/foo.h" resolves.
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    ; Rivr_core static library (ARM Cortex-M4F).
    ; --whole-archive forces the linker to include all symbols from the archive
    ; even when it appears before the object files in the link command (PlatformIO
    ; places build_flags before .o files; without this the single-pass linker
    ; skips the archive because no unresolved refs exist yet at that point).
    -Wl,--whole-archive
    -Wl,${PROJECT_DIR}/target/thumbv7em-none-eabihf/release/librivr_core.a
    -Wl,--no-whole-archive
    ; Platform tag
    -DRIVR_PLATFORM_NRF52840=1
    ; Required for PRIu32 etc. in C++ compilation units
    -D__STDC_FORMAT_MACROS=1
    ; Include the variant config
    -include ${PROJECT_DIR}/variants/heltec_t114/config.h

; ─────────────────────────────────────────────────────────────────────────────
; client_heltec_t114 – chat client, no relay
; ─────────────────────────────────────────────────────────────────────────────
[env:client_heltec_t114]
extends = env_nrf52_base
build_flags =
    ${env_nrf52_base.build_flags}
    ${rf_heltec_t114.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_heltec_t114\""

; ─────────────────────────────────────────────────────────────────────────────
; client_heltec_t114_ble – chat client + Bluefruit BLE companion interface
;
; Adds firmware_core/ble/rivr_ble_nrf52.cpp (nRF52 Adafruit Bluefruit backend)
; and enables RIVR_FEATURE_BLE so the Rivr Companion app can connect over BLE.
;
; The NUS service (Nordic UART Service UUIDs) is identical to the ESP32 BLE
; builds so the Companion app needs no changes.
;
; Set RIVR_BLE_PASSKEY to a non-zero 6-digit integer (e.g. 123456) to require
; MITM passkey bonding.  0 = open, any phone can connect.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_heltec_t114_ble]
extends = env_nrf52_base
lib_ldf_mode = deep+
build_src_filter =
    ${env_nrf52_base.build_src_filter}
    +<../firmware_core/ble/rivr_ble_frag.c>
    +<../firmware_core/ble/rivr_ble_nrf52.cpp>
build_flags =
    ${env_nrf52_base.build_flags}
    ${rf_heltec_t114.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=123456 ; set non-zero (e.g. 123456) to require MITM passkey bonding
    -DRIVR_BLE_RANDOM_PASSKEY=1
    "-DRIVR_BUILD_ENV=\"client_heltec_t114_ble\""

; ─────────────────────────────────────────────────────────────────────────────
; repeater_heltec_t114 – headless relay node
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_heltec_t114]
extends = env_nrf52_base
build_flags =
    ${env_nrf52_base.build_flags}
    ${rf_heltec_t114.build_flags}
    -DRIVR_ROLE_CLIENT=0
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_ROLE_REPEATER=1
    -DRIVR_NET_ID=0x0000
    "-DRIVR_CALLSIGN=\"RIVR\""
    "-DRIVR_BUILD_ENV=\"repeater_heltec_t114\""
