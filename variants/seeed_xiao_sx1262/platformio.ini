; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Seeed Studio XIAO ESP32S3 + Wio-SX1262                       ║
; ║           (ESP32-S3, onboard SX1262 via Wio expansion board)            ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_seeed_xiao_sx1262        – chat client, no CHAT/DATA relay     ║
; ║    client_seeed_xiao_sx1262_ble    – client + BLE bridge                 ║
; ║    repeater_seeed_xiao_sx1262      – fabric repeater, full relay         ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_seeed_xiao_sx1262       -t upload                   ║
; ║    pio run -e client_seeed_xiao_sx1262_ble   -t upload                   ║
; ║    pio run -e repeater_seeed_xiao_sx1262     -t upload                   ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; LoRa RF parameters – shared by all environments for this variant.
;
; Wio-SX1262 uses the onboard SX1262 with no external PA.
; Max chip output is +22 dBm; RF_TX_POWER_DBM=17 is a safe default.
;
;   RF_SPREADING_FACTOR   7 … 12
;   RF_BANDWIDTH_HZ       7800 | 10400 | 15600 | 20800 | 31250 | 41700 | 62500 | 125000 | 250000 | 500000
;   RF_CODING_RATE        5 (= 4/5) … 8 (= 4/8)
;   RF_TX_POWER_DBM       -9 … 22  (SX1262 chip output, no external PA)
;   RIVR_RF_FREQ_HZ       centre frequency in Hz
;                         869480000 = EU868 g3 (default)
;                         868100000 = EU868 channel 0
;                         915000000 = AU915 / US915
;                         923000000 = AS923
; ─────────────────────────────────────────────────────────────────────────────
[rf_seeed_xiao_sx1262]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=17
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; client_seeed_xiao_sx1262 – chat client, no CHAT/DATA relay
; ─────────────────────────────────────────────────────────────────────────────
[env:client_seeed_xiao_sx1262]
extends = env
board   = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    ${rf_seeed_xiao_sx1262.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_seeed_xiao_sx1262\""
    -DRIVR_FEATURE_DS18B20=0
    -DPIN_DS18B20_ONEWIRE=2
    -DRIVR_FEATURE_AM2302=0
    -DPIN_AM2302_DATA=3
    -DRIVR_SENSOR_TX_MS=10000
    -DRIVR_FEATURE_VBAT=0
    -DPIN_ADC_VBAT=0
    -DRIVR_VBAT_DIV_NUM=2
    -DRIVR_VBAT_DIV_DEN=1
    -include ${PROJECT_DIR}/variants/seeed_xiao_sx1262/config.h
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.xiao_usb_console"

; ─────────────────────────────────────────────────────────────────────────────
; client_seeed_xiao_sx1262_ble – client + BLE bridge
;
;   Requires sdkconfig/sdkconfig.ble BLE fragment (ESP32-S3 BLE supported).
; ─────────────────────────────────────────────────────────────────────────────
[env:client_seeed_xiao_sx1262_ble]
extends = env
board   = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    ${rf_seeed_xiao_sx1262.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=123456 ; set non-zero (e.g. 123456) to require MITM passkey bonding
    -DRIVR_BLE_RANDOM_PASSKEY=0
    "-DRIVR_BUILD_ENV=\"client_seeed_xiao_sx1262_ble\""
    -DRIVR_FEATURE_DS18B20=0
    -DPIN_DS18B20_ONEWIRE=2
    -DRIVR_FEATURE_AM2302=0
    -DPIN_AM2302_DATA=3
    -DRIVR_SENSOR_TX_MS=10000
    -DRIVR_FEATURE_VBAT=0
    -DPIN_ADC_VBAT=0
    -DRIVR_VBAT_DIV_NUM=2
    -DRIVR_VBAT_DIV_DEN=1
    -include ${PROJECT_DIR}/variants/seeed_xiao_sx1262/config.h
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.ble;sdkconfig.xiao_usb_console"


; ─────────────────────────────────────────────────────────────────────────────
; repeater_seeed_xiao_sx1262 – headless relay node, Rivr Fabric enabled
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_seeed_xiao_sx1262]
extends = env
board   = seeed_xiao_esp32s3
build_flags =
    ${env.build_flags}
    ${rf_seeed_xiao_sx1262.build_flags}
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_ROLE_REPEATER=1
    -DRIVR_NET_ID=0x0000
    "-DRIVR_CALLSIGN=\"RIVR\""
    "-DRIVR_BUILD_ENV=\"repeater_seeed_xiao_sx1262\""
    -DRIVR_FEATURE_DS18B20=0
    -DPIN_DS18B20_ONEWIRE=2
    -DRIVR_FEATURE_AM2302=0
    -DPIN_AM2302_DATA=3
    -DRIVR_SENSOR_TX_MS=10000
    -DRIVR_FEATURE_VBAT=0
    -DPIN_ADC_VBAT=0
    -DRIVR_VBAT_DIV_NUM=2
    -DRIVR_VBAT_DIV_DEN=1
    -include ${PROJECT_DIR}/variants/seeed_xiao_sx1262/config.h
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.xiao_usb_console"
