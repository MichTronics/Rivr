; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Heltec WiFi LoRa 32 V2  (ESP32, onboard SX1276, OLED)        ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_heltec_lora32_v2        – chat client, no CHAT/DATA relay      ║
; ║    client_heltec_lora32_v2_ble    – client + BLE bridge                  ║
; ║    repeater_heltec_lora32_v2      – fabric repeater, full relay          ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_heltec_lora32_v2       -t upload                    ║
; ║    pio run -e client_heltec_lora32_v2_ble   -t upload                    ║
; ║    pio run -e repeater_heltec_lora32_v2     -t upload                    ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; LoRa RF parameters – shared by both environments for this variant.
;
; Heltec V2 uses the onboard SX1276 with no external PA.
; Max chip output is +20 dBm (PA_BOOST mode); RF_TX_POWER_DBM=14 is safe.
;
;   RF_SPREADING_FACTOR   7 … 12
;   RF_BANDWIDTH_HZ       7800 | 10400 | 15600 | 20800 | 31250 | 41700 | 62500 | 125000 | 250000 | 500000
;   RF_CODING_RATE        5 (= 4/5) … 8 (= 4/8)
;   RF_TX_POWER_DBM       2 … 17 (standard) or up to 20 (+20 dBm PA_BOOST)
;   RIVR_RF_FREQ_HZ       centre frequency in Hz
;                         869480000 = EU868 g3 (default)
;                         868100000 = EU868 channel 0
;                         915000000 = AU915 / US915
;                         923000000 = AS923
; ─────────────────────────────────────────────────────────────────────────────
[rf_heltec_lora32_v2]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=14
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; client_heltec_lora32_v2 – chat client, no CHAT/DATA relay
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : send/receive PKT_CHAT/DATA; Rivr Fabric disabled.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_heltec_lora32_v2]
extends = env
board   = heltec_wifi_lora_32_V2
build_flags =
    ${env.build_flags}
    ${rf_heltec_lora32_v2.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_heltec_lora32_v2\""
    -include ${PROJECT_DIR}/variants/heltec_lora32_v2/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1

; ─────────────────────────────────────────────────────────────────────────────
; client_heltec_lora32_v2_ble – client + BLE bridge
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : chat client + BLE bridge (RIVR_FEATURE_BLE=1).
;           Advertises as "RIVR-XXXX", accepts GATT writes (Nordic NUS UUIDs).
; ─────────────────────────────────────────────────────────────────────────────
[env:client_heltec_lora32_v2_ble]
extends = env
board   = heltec_wifi_lora_32_V2
build_flags =
    ${env.build_flags}
    ${rf_heltec_lora32_v2.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=0              ; set non-zero (e.g. 123456) to require MITM passkey bonding
    "-DRIVR_BUILD_ENV=\"client_heltec_lora32_v2_ble\""
    -include ${PROJECT_DIR}/variants/heltec_lora32_v2/config.h
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1
    "-DSDKCONFIG_DEFAULTS=sdkconfig/sdkconfig.defaults;sdkconfig/sdkconfig.ble"

; ─────────────────────────────────────────────────────────────────────────────
; repeater_heltec_lora32_v2 – headless relay node, Rivr Fabric enabled
;
;   Radio : SX1276 — register-based SPI, no BUSY pin, DIO0=GPIO26
;   Role  : relay PKT_CHAT/DATA with congestion-aware DELAY/DROP via
;           RIVR Fabric (RIVR_FABRIC_REPEATER=1).
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_heltec_lora32_v2]
extends = env
board   = heltec_wifi_lora_32_V2
build_flags =
    ${env.build_flags}
    ${rf_heltec_lora32_v2.build_flags}
    -DRIVR_RADIO_SX1276=1
    -DRIVR_RADIO_SX1262=0
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_heltec_lora32_v2\""
    -include ${PROJECT_DIR}/variants/heltec_lora32_v2/config.h
; Tell CMake to select radio_sx1276.c instead of radio_sx1262.c.
board_build.cmake_extra_args =
    -DRIVR_CORE_EXPLICIT=1
    -DRIVR_RADIO_SX1276=1
