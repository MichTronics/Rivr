; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Seeed SenseCAP T1000-E  (nRF52840 + LR1110)                  ║
; ║                                                                          ║
; ║  Status: experimental. Uses a new nRF52-only LR1110 driver that wraps   ║
; ║  RadioLib and follows MeshCore's T1000-E bring-up.                      ║
; ║                                                                          ║
; ║  Sources for pin map / board metadata: MeshCore T1000-E variant +       ║
; ║  Seeed T1000-E documentation.                                           ║
; ║                                                                          ║
; ║  Environments:                                                           ║
; ║    client_seeed_t1000_e      – chat client, no BLE                      ║
; ║    client_seeed_t1000_e_ble  – chat client + Bluefruit BLE companion    ║
; ║    repeater_seeed_t1000_e    – fabric repeater                          ║
; ╚══════════════════════════════════════════════════════════════════════════╝

[rf_seeed_t1000_e]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRIVR_RF_FREQ_HZ=869480000

[env_t1000_e_base]
platform  = nordicnrf52
platform_packages = framework-arduinoadafruitnrf52 @ 1.10700.0
framework = arduino
board     = tracker_t1000_e
lib_ldf_mode = deep+
lib_deps =
    SPI
    Wire
    ${sysenv.HOME}/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino
    jgromes/RadioLib @ ^7.3.0

build_src_filter =
    -<*>
    +<../firmware_core/dutycycle.c>
    +<../firmware_core/airtime_sched.c>
    +<../firmware_core/beacon_sched.c>
    +<../firmware_core/protocol.c>
    +<../firmware_core/routing.c>
    +<../firmware_core/route_cache.c>
    +<../firmware_core/neighbor_table.c>
    +<../firmware_core/pending_queue.c>
    +<../firmware_core/rivr_fabric.c>
    +<../firmware_core/rivr_metrics.c>
    +<../firmware_core/rivr_log.c>
    +<../firmware_core/retry_table.c>
    +<../firmware_core/build_info.c>
    +<../firmware_core/ed25519_verify.c>
    +<../firmware_core/rivr_ota_core.c>
    +<../firmware_core/rivr_ota_platform_nrf52.c>
    +<../firmware_core/policy.c>
    +<../firmware_core/hal/radio_if.c>
    +<../firmware_core/rivr_policy.c>
    +<../firmware_core/crypto/hmac_sha256.c>
    +<../firmware_core/rivr_bus/rivr_bus.c>
    +<../firmware_core/rivr_bus/rivr_dup_cache.c>
    +<../firmware_core/rivr_bus/rivr_dispatch.c>
    +<../firmware_core/ble/rivr_ble_companion.c>
    +<../firmware_core/iface/rivr_iface_ble.c>
    +<../firmware_core/iface/rivr_iface_lora.c>
    +<../rivr_layer/rivr_embed.c>
    +<../rivr_layer/rivr_sinks.c>
    +<../rivr_layer/rivr_sources.c>
    +<../rivr_layer/rivr_cli.c>
    +<../rivr_layer/rivr_svc.c>
    +<platform_nrf52.cpp>
    +<radio_lr1110_nrf52.cpp>
    +<timebase_nrf52.c>
    +<rivr_panic_nrf52.c>
    +<../variants/seeed_t1000_e/variant.cpp>
    +<../variants/heltec_t114/main_nrf52.cpp>

build_flags =
    -I${PROJECT_DIR}/variants/heltec_t114/compat
    -I${PROJECT_DIR}/variants/seeed_t1000_e
    -I${sysenv.HOME}/.platformio/packages/framework-arduinoadafruitnrf52/libraries/SPI
    -I${sysenv.HOME}/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Wire
    -I${sysenv.HOME}/.platformio/packages/framework-arduinoadafruitnrf52/libraries/Adafruit_TinyUSB_Arduino/src
    -I${PROJECT_DIR}
    -I${PROJECT_DIR}/firmware_core
    -I${PROJECT_DIR}/rivr_layer
    -Wl,--whole-archive
    -Wl,${PROJECT_DIR}/target/thumbv7em-none-eabihf/release/librivr_core.a
    -Wl,--no-whole-archive
    -DRIVR_PLATFORM_NRF52840=1
    -D__STDC_FORMAT_MACROS=1
    -include ${PROJECT_DIR}/variants/seeed_t1000_e/config.h

[env:client_seeed_t1000_e]
extends = env_t1000_e_base
build_flags =
    ${env_t1000_e_base.build_flags}
    ${rf_seeed_t1000_e.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_seeed_t1000_e\""

; ─────────────────────────────────────────────────────────────────────────────
; client_seeed_t1000_e_ble — chat client + Bluefruit BLE companion interface
;
; Adds firmware_core/ble/rivr_ble_nrf52.cpp (nRF52 Adafruit Bluefruit backend)
; and enables RIVR_FEATURE_BLE so the Rivr Companion app can connect over BLE.
;
; The NUS service (Nordic UART Service UUIDs) is identical to the ESP32 BLE
; builds so the Companion app needs no changes.
;
; Set RIVR_BLE_PASSKEY to a non-zero 6-digit integer (e.g. 123456) to require
; MITM passkey bonding.  0 = open, any phone can connect.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_seeed_t1000_e_ble]
extends = env_t1000_e_base
build_src_filter =
    ${env_t1000_e_base.build_src_filter}
    +<../firmware_core/ble/rivr_ble_nrf52.cpp>
build_flags =
    ${env_t1000_e_base.build_flags}
    ${rf_seeed_t1000_e.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=123456 ; set non-zero (e.g. 123456) to require MITM passkey bonding
    -DRIVR_BLE_RANDOM_PASSKEY=0
    "-DRIVR_BUILD_ENV=\"client_seeed_t1000_e_ble\""

[env:repeater_seeed_t1000_e]
extends = env_t1000_e_base
build_flags =
    ${env_t1000_e_base.build_flags}
    ${rf_seeed_t1000_e.build_flags}
    -DRIVR_ROLE_CLIENT=0
    -DRIVR_ROLE_REPEATER=1
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_NET_ID=0x0000
    "-DRIVR_CALLSIGN=\"RIVR\""
    "-DRIVR_BUILD_ENV=\"repeater_seeed_t1000_e\""
