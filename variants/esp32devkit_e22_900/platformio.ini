; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: ESP32 DevKit V1 + EBYTE E22-900M30S/33S (SX1262, 868/915 MHz) ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_esp32devkit_e22_900        – chat client, no CHAT/DATA relay   ║
; ║    client_esp32devkit_e22_900_ble    – client + BLE bridge               ║
; ║    repeater_esp32devkit_e22_900      – fabric repeater, full relay       ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_esp32devkit_e22_900       -t upload                 ║
; ║    pio run -e client_esp32devkit_e22_900_ble   -t upload                 ║
; ║    pio run -e repeater_esp32devkit_e22_900     -t upload                 ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; LoRa RF parameters – shared by both environments for this variant.
;
; Edit the values below to change the air interface for ALL e22-900 builds.
; Both the client and repeater environment pick these up via
; ${rf_e22_900.build_flags} so you only need to change them in one place.
;
;   RF_SPREADING_FACTOR   7 … 12  (higher = longer range, lower data rate)
;   RF_BANDWIDTH_HZ       7800 | 10400 | 15600 | 20800 | 31250 | 41700 | 62500 | 125000 | 250000 | 500000
;   RF_CODING_RATE        5 (= 4/5, low overhead) … 8 (= 4/8, max redundancy)
;   RF_TX_POWER_DBM       −9 … 22  (SX1262 chip output; E22 PA adds ~8 dBm)
;   RIVR_RF_FREQ_HZ       centre frequency in Hz
;                         869480000 = EU868 g3 high-power (default)
;                         868100000 = EU868 channel 0
;                         915000000 = AU915 / US915
;                         923000000 = AS923
; ─────────────────────────────────────────────────────────────────────────────
[rf_e22_900]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_HZ=62500
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=22
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; client_esp32devkit_e22_900 – chat client, no CHAT/DATA relay
;
;   Role : send/receive PKT_CHAT/DATA; control frames relay normally.
;          Rivr Fabric completely disabled (RIVR_FABRIC_REPEATER=0).
; ─────────────────────────────────────────────────────────────────────────────
[env:client_esp32devkit_e22_900]
extends = env
build_flags =
    ${env.build_flags}
    ${rf_e22_900.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_esp32devkit_e22_900\""
    -DRIVR_FEATURE_DS18B20=1
    -DPIN_DS18B20_ONEWIRE=27
    -DRIVR_FEATURE_AM2302=1
    -DPIN_AM2302_DATA=26
    -DRIVR_SENSOR_TX_MS=10000
    -include ${PROJECT_DIR}/variants/esp32devkit_e22_900/config.h
board_build.cmake_extra_args =

; ─────────────────────────────────────────────────────────────────────────────
; client_esp32devkit_e22_900_ble – client + BLE bridge
;
;   Same role as client_esp32devkit_e22_900 but adds the BLE bridge
;   (RIVR_FEATURE_BLE=1).  The node advertises as "RIVR-XXXX" and accepts
;   GATT characteristic writes carrying binary Rivr frames (Nordic NUS UUIDs).
;   Requires the sdkconfig/sdkconfig.ble BLE configuration fragment.
; ─────────────────────────────────────────────────────────────────────────────
[env:client_esp32devkit_e22_900_ble]
extends = env
build_flags =
    ${env.build_flags}
    ${rf_e22_900.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    -DRIVR_FEATURE_BLE=1
    -DRIVR_BLE_PASSKEY=123456
    -DRIVR_BLE_RANDOM_PASSKEY=1       ; MeshCore-style session PIN shown on the node
    "-DRIVR_BUILD_ENV=\"client_esp32devkit_e22_900_ble\""
    -include ${PROJECT_DIR}/variants/esp32devkit_e22_900/config.h
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.ble"


; ─────────────────────────────────────────────────────────────────────────────
; repeater_esp32devkit_e22_900 – headless relay node, Rivr Fabric enabled
;
;   Role : relay PKT_CHAT/DATA with congestion-aware DELAY/DROP via
;          RIVR Fabric (RIVR_FABRIC_REPEATER=1).
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_esp32devkit_e22_900]
extends = env
build_flags =
    ${env.build_flags}
    ${rf_e22_900.build_flags}
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_ROLE_REPEATER=1
    -DRIVR_NET_ID=0x0000
    "-DRIVR_CALLSIGN=\"RIVR\""
    "-DRIVR_BUILD_ENV=\"repeater_esp32devkit_e22_900\""
    -include ${PROJECT_DIR}/variants/esp32devkit_e22_900/config.h
board_build.cmake_extra_args =
