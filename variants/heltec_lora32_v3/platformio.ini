; ╔══════════════════════════════════════════════════════════════════════════╗
; ║  Variant: Heltec WiFi LoRa 32 V3  (ESP32-S3, onboard SX1262, OLED)     ║
; ║                                                                          ║
; ║  Environments defined here (included by root platformio.ini):            ║
; ║    client_heltec_lora32_v3    – chat client, no CHAT/DATA relay          ║
; ║    repeater_heltec_lora32_v3  – fabric repeater, full relay              ║
; ║                                                                          ║
; ║  Build:                                                                  ║
; ║    pio run -e client_heltec_lora32_v3   -t upload                        ║
; ║    pio run -e repeater_heltec_lora32_v3 -t upload                        ║
; ╚══════════════════════════════════════════════════════════════════════════╝

; ─────────────────────────────────────────────────────────────────────────────
; LoRa RF parameters – shared by both environments for this variant.
;
; Heltec V3 uses the onboard SX1262 with no external PA.
; Max chip output is +22 dBm; RF_TX_POWER_DBM=17 is a safe default.
;
;   RF_SPREADING_FACTOR   7 … 12
;   RF_BANDWIDTH_KHZ      7 | 10 | 15 | 20 | 31 | 41 | 62 | 125 | 250 | 500
;   RF_CODING_RATE        5 (= 4/5) … 8 (= 4/8)
;   RF_TX_POWER_DBM       -9 … 22  (SX1262 chip output, no external PA)
;   RIVR_RF_FREQ_HZ       centre frequency in Hz
;                         869480000 = EU868 g3 (default)
;                         868100000 = EU868 channel 0
;                         915000000 = AU915 / US915
;                         923000000 = AS923
; ─────────────────────────────────────────────────────────────────────────────
[rf_heltec_lora32_v3]
build_flags =
    -DRF_SPREADING_FACTOR=8
    -DRF_BANDWIDTH_KHZ=125
    -DRF_CODING_RATE=8
    -DRF_TX_POWER_DBM=17
    -DRIVR_RF_FREQ_HZ=869480000

; ─────────────────────────────────────────────────────────────────────────────
; client_heltec_lora32_v3 – chat client, no CHAT/DATA relay
; ─────────────────────────────────────────────────────────────────────────────
[env:client_heltec_lora32_v3]
extends = env
board   = heltec_wifi_lora_32_V3
build_flags =
    ${env.build_flags}
    ${rf_heltec_lora32_v3.build_flags}
    -DRIVR_ROLE_CLIENT=1
    -DRIVR_FABRIC_REPEATER=0
    "-DRIVR_BUILD_ENV=\"client_heltec_lora32_v3\""
    -include ${PROJECT_DIR}/variants/heltec_lora32_v3/config.h

; ─────────────────────────────────────────────────────────────────────────────
; repeater_heltec_lora32_v3 – headless relay node, Rivr Fabric enabled
; ─────────────────────────────────────────────────────────────────────────────
[env:repeater_heltec_lora32_v3]
extends = env
board   = heltec_wifi_lora_32_V3
build_flags =
    ${env.build_flags}
    ${rf_heltec_lora32_v3.build_flags}
    -DRIVR_FABRIC_REPEATER=1
    -DRIVR_BUILD_REPEATER=1
    "-DRIVR_BUILD_ENV=\"repeater_heltec_lora32_v3\""
    -include ${PROJECT_DIR}/variants/heltec_lora32_v3/config.h
